<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Аналитика{% endblock %} | Nuvio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand"><img src="/static/logo.svg" alt="Nuvio" class="nav-logo">Nuvio</a>
        <div class="nav-links">
            <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">Дашборд</a>
            <a href="/users" class="nav-link {% block nav_users %}{% endblock %}">Пользователи</a>
            <a href="/logout" class="nav-link nav-logout">Выход</a>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
