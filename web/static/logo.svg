<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle shine overlay -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#shine)"/>

  <!-- Play triangle (shifted left-up) -->
  <path d="M200 148 L200 308 L340 228 Z" fill="#fff" opacity="0.95"/>

  <!-- Download arrow below -->
  <path d="M232 320 L256 356 L280 320" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>

  <!-- Bottom line (landing pad) -->
  <line x1="208" y1="376" x2="304" y2="376" stroke="#fff" stroke-width="14" stroke-linecap="round" opacity="0.7"/>
</svg>
