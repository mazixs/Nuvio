name: Python Syntax Tests

# Запуск тестов при push и pull request
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  syntax-tests:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.13, 3.14]
    
    steps:
    - uses: actions/checkout@v4.2.2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5.6.0
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Устанавливаем только pytest для тестов синтаксиса
        # Полные зависимости не нужны для проверки синтаксиса
    
    - name: Run syntax tests with pytest
      run: |
        pytest tests/test_syntax.py -v
