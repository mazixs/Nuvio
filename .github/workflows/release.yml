name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Тесты перед релизом ──────────────────────────────
  test:
    name: Тесты перед релизом
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Установка зависимостей
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Запуск тестов
        run: pytest tests/ -v -m "syntax or unit" --tb=short

  # ── Changelog + GitHub Release ────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [test]
    # softprops/action-gh-release@v2 пока на Node 20 (issue #654)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.meta.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Метаданные версии
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Генерация changelog
        id: changelog
        run: |
          # Находим предыдущий тег
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            # Первый релиз — все коммиты
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
          fi

          echo "Диапазон коммитов: $RANGE"

          # Собираем коммиты по категориям
          {
            echo "changelog<<CHANGELOG_EOF"

            # Features
            FEAT=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" --grep="^add" --grep="добавл" -i 2>/dev/null || true)
            if [ -n "$FEAT" ]; then
              echo "### ✨ Новое"
              echo "$FEAT"
              echo ""
            fi

            # Fixes
            FIX=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" --grep="исправ" --grep="починк" -i 2>/dev/null || true)
            if [ -n "$FIX" ]; then
              echo "### 🐛 Исправления"
              echo "$FIX"
              echo ""
            fi

            # Other changes (all commits not matching above)
            OTHER=$(git log "$RANGE" --pretty=format:"- %s" 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "### 📦 Все изменения"
              echo "$OTHER"
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Создание GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nuvio v${{ steps.meta.outputs.version }}"
          tag_name: ${{ steps.meta.outputs.tag }}
          body: |
            ## 🚀 Nuvio v${{ steps.meta.outputs.version }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📥 Установка

            **Docker (рекомендуется):**
            ```bash
            # Скачать конкретную версию
            docker pull ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}

            # Или использовать docker-compose
            wget https://raw.githubusercontent.com/${{ github.repository }}/v${{ steps.meta.outputs.version }}/docker-compose.prod.yml
            TAG=${{ steps.meta.outputs.version }} docker compose -f docker-compose.prod.yml up -d
            ```

            **Git:**
            ```bash
            git clone --branch v${{ steps.meta.outputs.version }} --depth 1 https://github.com/${{ github.repository }}.git
            cd Nuvio
            cp .env.example .env  # настроить переменные
            pip install -r requirements.txt
            python main.py
            ```
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
          generate_release_notes: true

  # ── Docker → GHCR ────────────────────────────────────
  docker:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v6

      - name: Авторизация в GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Метаданные Docker
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Сборка и пуш образа
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
