# Nuvio — локальная разработка (сборка из исходников)
# Быстрый старт:
#   1. cp .env.example .env
#   2. Заполнить TELEGRAM_TOKEN и ADMIN_IDS в .env
#   3. docker compose up --build

services:
  bot:
    build: .
    container_name: nuvio-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      # ── Переменные бота (задать в .env) ───────────────
      # TELEGRAM_TOKEN=              ← обязательно
      # ADMIN_IDS=123456789          ← обязательно
      # LOG_LEVEL=INFO
      # GOKAPI_BASE_URL=
      # GOKAPI_API_KEY=
      # YTDLP_AUTO_UPDATE=true
      # YTDLP_RELEASE_CHANNEL=nightly
    volumes:
      - bot-data:/app/data
      - ./logs:/app/logs
      - ./.secrets:/app/.secrets
    depends_on:
      - web

  web:
    build: .
    container_name: nuvio-web
    restart: unless-stopped
    command: python -m web.app
    env_file: .env
    environment:
      - DATA_DIR=/app/data
      # ── Переменные дашборда (задать в .env) ───────────
      # WEB_USERNAME=admin
      # WEB_PASSWORD=changeme        ← сменить!
      # WEB_PORT=8080
      # WEB_SECRET_KEY=random_string
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
    volumes:
      - bot-data:/app/data

volumes:
  bot-data:
